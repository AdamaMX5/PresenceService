# docker-compose.yml  (lokale Entwicklung)
services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no  # kein Persist für Dev

  presence:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    # Hot-reload für Entwicklung
    volumes:
      - .:/app
    working_dir: /app 
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
